<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Job Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style id="shared-styles"></style>
<style>
/* ── Kanban ── */
.kanban-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.kanban-toolbar input{flex:1;max-width:360px;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font:400 13px 'Inter',sans-serif;color:var(--ink);background:var(--surface)}
.kanban-toolbar input:focus{outline:none;border-color:var(--accent)}
.stats{display:flex;gap:20px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;flex:1;text-align:center}
.stat-num{font-size:24px;font-weight:800;color:var(--ink)}
.stat-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.kanban{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:16px}
.kanban::-webkit-scrollbar{height:4px}
.kanban::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.kol{width:240px;flex-shrink:0}
.kol-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.kol-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink2)}
.kol-dot{width:8px;height:8px;border-radius:50%}
.kol-count{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:1px 8px;color:var(--ink3)}
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;position:relative}
.job-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(233,30,140,.08)}
.job-card-company{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.job-card-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.3}
.job-card-meta{display:flex;align-items:center;justify-content:space-between}
.job-card-date{font-size:10px;color:var(--ink4)}
.score-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;color:#fff}
.score-high{background:var(--green)}.score-mid{background:var(--orange)}.score-low{background:var(--red)}.score-none{background:var(--ink4)}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:2px;opacity:0;transition:.15s}
.job-card:hover .card-actions{opacity:1}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:14px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.modal-head h2{font-size:16px;font-weight:600}
.modal-close{width:30px;height:30px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:18px;color:var(--ink3);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:18px 20px}
.modal-foot{padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border)}
.ai-extract-row{display:flex;gap:8px;margin-bottom:14px}
.ai-extract-row input{flex:1;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font:400 13px 'Inter',sans-serif}
.ai-extract-row input:focus{outline:none;border-color:var(--accent)}
.score-section{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.score-big{font-size:28px;font-weight:800}
.score-big.high{color:var(--green)}.score-big.mid{color:var(--orange)}.score-big.low{color:var(--red)}
.score-summary{font-size:12px;color:var(--ink2);max-width:320px;line-height:1.5}
</style>
</head>
<body>
<script src="shared.js"></script>
<script>requireAuth();</script>
<script>
// Inject shared CSS
document.getElementById("shared-styles").textContent = SHARED_CSS;
// Render sidebar
document.write(renderSidebar("tracker"));
</script>

<div class="main">
  <div class="topnav">
    <span style="font-size:15px;font-weight:700;color:var(--ink)">💼 Job Tracker</span>
    <div class="topnav-right">
      <button class="btn btn-accent" onclick="openAddModal()">+ Add Job</button>
    </div>
  </div>

  <div class="content-area">
    <!-- URL extract bar -->
    <div class="kanban-toolbar">
      <input id="url-input" type="url" placeholder="Paste a job posting URL to extract with AI…" onkeydown="if(event.key==='Enter')extractJob()"/>
      <button class="btn btn-accent" onclick="extractJob()" id="extract-btn">✨ Extract</button>
    </div>
    <!-- Stats -->
    <div class="stats" id="stats-bar"></div>
    <!-- Kanban -->
    <div class="kanban" id="kanban-board"></div>
  </div>
</div>

<!-- Job Modal -->
<div class="modal-bg" id="job-modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><h2 id="modal-title">Add Job</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="ai-extract-row">
        <input id="modal-url" type="url" placeholder="Paste URL to auto-fill…"/>
        <button class="btn btn-accent btn-sm" onclick="extractFromModal()" id="modal-extract-btn">✨ Fill</button>
      </div>
      <div class="ai-status" id="modal-ai-status"></div>
      <div class="field-row" style="margin-bottom:12px">
        <div class="field"><label>Job Title *</label><input id="j-title" placeholder="e.g. Mechanical Engineer"/></div>
        <div class="field"><label>Company *</label><input id="j-company" placeholder="e.g. Acme Corp"/></div>
      </div>
      <div class="field"><label>Status</label>
        <select id="j-status"><option>Applied</option><option>Phone screen</option><option>Interview</option><option>Offer</option><option>Rejected</option></select>
      </div>
      <div class="field"><label>Job Description</label><textarea id="j-desc" rows="4" placeholder="Paste or auto-fill…"></textarea></div>
      <div class="field"><label>Notes</label><textarea id="j-notes" rows="2" placeholder="Personal notes…"></textarea></div>
      <div id="modal-score-section" style="display:none">
        <div class="score-section">
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Resume Match</div>
            <div class="score-big" id="modal-score-num">—</div>
            <div class="score-summary" id="modal-score-summary"></div>
          </div>
          <button class="btn btn-sm" onclick="scoreJob()" id="score-btn">🎯 Score</button>
        </div>
      </div>
      <div id="modal-cl-section" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:12px;font-weight:600;color:var(--ink2)">Cover Letter</div>
          <button class="btn btn-sm" onclick="generateJobCL()" id="cl-gen-btn">✨ Generate</button>
        </div>
        <textarea id="j-cl-body" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font:400 13px 'Inter',sans-serif;resize:vertical;min-height:120px;line-height:1.7" placeholder="Generate or write your cover letter…"></textarea>
        <div class="ai-status" id="modal-cl-status"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveJob()" id="save-job-btn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var jobs = Store.get("jt_jobs") || []; // loaded from Supabase on DOMContentLoaded
var jobIdCounter = Store.get("jt_jobCounter") || 0;
var editingJobId = null;

var STATUSES = ["Applied","Phone screen","Interview","Offer","Rejected"];
var STATUS_COLORS = {"Applied":"#3b82f6","Phone screen":"#f59e0b","Interview":"#8b5cf6","Offer":"#16a34a","Rejected":"#dc2626"};

function saveJobs() {
  Store.set("jt_jobs", jobs);
  Store.set("jt_jobCounter", jobIdCounter);
  // Async save to Supabase
  if(window.dbSaveJobs) window.dbSaveJobs(jobs).catch(function(e){ console.warn("Supabase save failed:", e); });
}

function renderKanban() {
  var board = el("kanban-board");
  board.innerHTML = "";
  STATUSES.forEach(function(status) {
    var statusJobs = jobs.filter(function(j){ return j.status===status; });
    var kol = document.createElement("div");
    kol.className = "kol";
    kol.innerHTML = '<div class="kol-head"><div class="kol-title"><div class="kol-dot" style="background:'+STATUS_COLORS[status]+'"></div>'+esc(status)+'</div><span class="kol-count">'+statusJobs.length+'</span></div><div class="kol-body" id="kol-'+status.replace(/\s/g,'-')+'"></div>';
    board.appendChild(kol);
    var body = kol.querySelector(".kol-body");
    statusJobs.forEach(function(job) {
      var score = job.matchScore;
      var sc = score==null?"score-none":score>=80?"score-high":score>=60?"score-mid":"score-low";
      var card = document.createElement("div");
      card.className = "job-card";
      card.innerHTML = '<div class="card-actions"><button class="icon-btn" onclick="event.stopPropagation();openEditModal(\''+job.id+'\')" title="Edit">✏️</button><button class="icon-btn del" onclick="event.stopPropagation();deleteJob(\''+job.id+'\')" title="Delete">🗑</button></div>'+
        '<div class="job-card-company">'+esc(job.company||"Unknown")+'</div>'+
        '<div class="job-card-title">'+esc(job.title)+'</div>'+
        '<div class="job-card-meta"><span class="job-card-date">'+new Date(job.addedAt).toLocaleDateString("en-CA",{month:"short",day:"numeric"})+'</span>'+
        '<span class="score-pill '+sc+'">'+(score==null?"No score":score+"/100")+'</span></div>'+
        (job.url?'<div style="margin-top:6px"><a href="'+esc(job.url)+'" target="_blank" style="font-size:10px;color:var(--accent)">↗ View posting</a></div>':"");
      card.onclick = function(){ openEditModal(job.id); };
      body.appendChild(card);
    });
  });
  // Stats
  var statsBar = el("stats-bar");
  var statDefs = [{label:"Total",val:jobs.length},{label:"Interviews",val:jobs.filter(function(j){return j.status==="Interview";}).length},{label:"Offers",val:jobs.filter(function(j){return j.status==="Offer";}).length},{label:"Rejected",val:jobs.filter(function(j){return j.status==="Rejected";}).length}];
  statsBar.innerHTML = statDefs.map(function(s){ return '<div class="stat"><div class="stat-num">'+s.val+'</div><div class="stat-label">'+s.label+'</div></div>'; }).join("");
}

async function extractJob() {
  var url = v("url-input");
  if(!url){ showToast("Paste a job URL first",true); return; }
  var btn = el("extract-btn");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Extracting…';
  try {
    var info = await extractJobInfo(url);
    openAddModal(info, url);
    el("url-input").value = "";
  } catch(e) { showToast("Extraction failed: "+e.message,true); }
  finally { btn.disabled=false; btn.innerHTML="✨ Extract"; }
}

async function extractFromModal() {
  var url = v("modal-url");
  if(!url){ setStatus("modal-ai-status","Enter a URL first.",true); return; }
  var btn = el("modal-extract-btn");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  setStatus("modal-ai-status",'<span class="spinner"></span> Extracting…');
  try {
    var info = await extractJobInfo(url);
    if(info.title)   el("j-title").value   = info.title;
    if(info.company) el("j-company").value = info.company;
    if(info.description) el("j-desc").value = info.description;
    setStatus("modal-ai-status","✓ Done! Review and save.");
  } catch(e) { setStatus("modal-ai-status","Error: "+e.message,true); }
  finally { btn.disabled=false; btn.innerHTML="✨ Fill"; }
}

async function extractJobInfo(url) {
  var raw = await callGemini('Visit this URL and extract job info. Return ONLY valid JSON: {"title":"...","company":"...","description":"3-5 sentence summary"}\nURL: '+url, true);
  return parseJSON(raw);
}

function openAddModal(prefill, url) {
  prefill = prefill||{}; url = url||"";
  editingJobId = null;
  el("modal-title").textContent = "Add Job";
  el("save-job-btn").textContent = "Save";
  el("modal-url").value  = url;
  el("j-title").value    = prefill.title||"";
  el("j-company").value  = prefill.company||"";
  el("j-desc").value     = prefill.description||"";
  el("j-notes").value    = "";
  el("j-cl-body").value  = "";
  el("j-status").value   = "Applied";
  el("modal-ai-status").textContent = "";
  el("modal-score-section").style.display = "none";
  el("modal-cl-section").style.display   = "none";
  el("job-modal-bg").classList.add("open");
}

function openEditModal(id) {
  var job = jobs.find(function(j){ return j.id===id; });
  if(!job) return;
  editingJobId = id;
  el("modal-title").textContent = "Edit Job";
  el("save-job-btn").textContent = "Update";
  el("modal-url").value  = job.url||"";
  el("j-title").value    = job.title||"";
  el("j-company").value  = job.company||"";
  el("j-desc").value     = job.description||"";
  el("j-notes").value    = job.notes||"";
  el("j-cl-body").value  = job.coverLetter||"";
  el("j-status").value   = job.status||"Applied";
  el("modal-ai-status").textContent = "";
  el("modal-score-section").style.display = "block";
  var scoreEl = el("modal-score-num");
  if(job.matchScore!=null) {
    scoreEl.textContent = job.matchScore+"/100";
    scoreEl.className = "score-big "+(job.matchScore>=80?"high":job.matchScore>=60?"mid":"low");
    el("modal-score-summary").textContent = job.scoreSummary||"";
  } else {
    scoreEl.textContent = "—"; scoreEl.className = "score-big";
    el("modal-score-summary").textContent = "Click Score to analyse this job against your resume.";
  }
  el("modal-cl-section").style.display = "block";
  el("modal-cl-status").textContent = "";
  el("job-modal-bg").classList.add("open");
}

function closeModal() { el("job-modal-bg").classList.remove("open"); editingJobId=null; }

function saveJob() {
  var title = v("j-title");
  if(!title){ showToast("Job title is required",true); return; }
  if(editingJobId) {
    var job = jobs.find(function(j){ return j.id===editingJobId; });
    if(job){ job.url=v("modal-url"); job.title=title; job.company=v("j-company"); job.status=v("j-status"); job.description=v("j-desc"); job.notes=v("j-notes"); job.coverLetter=v("j-cl-body"); }
    showToast("Job updated");
  } else {
    jobs.unshift({id:"job-"+(++jobIdCounter),url:v("modal-url"),title:title,company:v("j-company"),status:v("j-status"),description:v("j-desc"),notes:v("j-notes"),coverLetter:v("j-cl-body"),matchScore:null,scoreSummary:"",addedAt:Date.now()});
    showToast("Added: "+title);
  }
  saveJobs(); closeModal(); renderKanban();
}

function deleteJob(id) {
  if(!confirm("Delete this job?")) return;
  jobs = jobs.filter(function(j){ return j.id!==id; });
  saveJobs(); renderKanban(); showToast("Deleted");
}

async function scoreJob() {
  var btn = el("score-btn");
  var desc = v("j-desc");
  if(!desc){ showToast("No job description",true); return; }
  var resumeText = buildResumePlainText();
  if(!resumeText.trim()){ showToast("Fill in your resume first",true); return; }
  btn.disabled=true; btn.textContent="Scoring…";
  try {
    var raw  = await callGemini('Score how well this resume matches this job. Return ONLY valid JSON: {"score":75,"summary":"One sentence."}\n\nRESUME:\n'+resumeText+'\n\nJOB DESCRIPTION:\n'+desc, false);
    var data = parseJSON(raw);
    var score = parseInt(data.score)||0;
    var scoreEl = el("modal-score-num");
    scoreEl.textContent = score+"/100";
    scoreEl.className = "score-big "+(score>=80?"high":score>=60?"mid":"low");
    el("modal-score-summary").textContent = data.summary||"";
    if(editingJobId) {
      var job = jobs.find(function(j){ return j.id===editingJobId; });
      if(job){ job.matchScore=score; job.scoreSummary=data.summary||""; }
      saveJobs(); renderKanban();
    }
    showToast("Scored!");
  } catch(e) { showToast("Scoring failed: "+e.message,true); }
  finally { btn.disabled=false; btn.textContent="🎯 Score"; }
}

async function generateJobCL() {
  var btn = el("cl-gen-btn");
  var desc = v("j-desc");
  if(!desc){ showToast("No job description",true); return; }
  btn.disabled=true; btn.textContent="Writing…";
  setStatus("modal-cl-status",'<span class="spinner"></span> Generating…');
  try {
    var resumeText = buildResumePlainText();
    var raw = await callGemini('Write a professional tailored cover letter body only (no date/address/salutation/sign-off). 3-4 paragraphs. Separate with blank lines. Return only the body text.\n\nCANDIDATE RESUME:\n'+resumeText+'\nJOB: '+v("j-title")+' at '+v("j-company")+'\nJOB DESCRIPTION:\n'+desc, false);
    el("j-cl-body").value = raw.trim();
    setStatus("modal-cl-status","✓ Cover letter generated!");
  } catch(e) { setStatus("modal-cl-status","Error: "+e.message,true); }
  finally { btn.disabled=false; btn.textContent="✨ Generate"; }
}

function setStatus(id, msg, err) {
  var s = el(id); if(!s) return;
  s.innerHTML = msg;
  s.className = "ai-status"+(err?" err":"");
}

// Expose for inline handlers
window.extractJob=extractJob; window.extractFromModal=extractFromModal;
window.openAddModal=openAddModal; window.openEditModal=openEditModal;
window.closeModal=closeModal; window.saveJob=saveJob; window.deleteJob=deleteJob;
window.scoreJob=scoreJob; window.generateJobCL=generateJobCL;

// ── Init: wait for Supabase auth then load data ──────────────────────────────
(async function init() {
  renderSidebar("tracker");
  // requireAuth already waited for session — just load data now
  try {
    var remoteJobs = await window.dbLoadJobs();
    if(remoteJobs && remoteJobs.length > 0) {
      jobs = remoteJobs;
      Store.set("jt_jobs", jobs);
    }
  } catch(e) { console.warn("Supabase jobs load failed, using local:", e); }
  renderKanban();
})();
</script>
</body>
</html>
